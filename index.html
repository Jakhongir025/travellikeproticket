<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Like Pro - Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-blue: #1a2b56;
            --light-blue: #eef3f8;
            --text-grey: #7f8c8d;
            --border-color: #d1d8e0;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f0f3f5; 
            margin: 0; 
            padding: 20px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Navigatsiya paneli */
        .controls { 
            background: white; padding: 15px; border-radius: 12px; 
            width: 900px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            position: sticky; top: 10px; z-index: 1000;
        }

        button { 
            padding: 8px 16px; cursor: pointer; border: 1.5px solid var(--primary-blue); 
            border-radius: 6px; font-weight: 700; font-size: 13px;
            background: white; color: var(--primary-blue); transition: 0.2s;
        }
        button:hover, button.active { background: var(--primary-blue); color: white; }
        .btn-pdf { background: #f24484; color: white; border: none; margin-left: 15px; }
        .multi-options { display: none; gap: 8px; align-items: center; margin-left: 10px; }

        /* PDF Konteyner */
        #ticket-container { width: 210mm; background: white; margin: 0; padding: 0; }

        .page { 
            width: 210mm; 
            height: 296mm; 
            padding: 10mm 10mm; 
            background: white; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        .page-break { page-break-before: always; }

        .top-line {
            border-bottom: 1px solid #e0e0e0; padding-bottom: 5px; margin-bottom: 25px;
            font-size: 10px; font-weight: 800; color: var(--text-grey); letter-spacing: 1.2px; text-transform: uppercase;
        }

        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-box img { height: 200px; }
        .agency-info { text-align: right; }
        .agency-name { font-weight: 900; color: var(--primary-blue); font-size: 18px; margin-bottom: 3px; }
        .agency-details { font-size: 12.5px; color: #444; font-weight: 500; }

        .column-labels {
            display: grid; 
            grid-template-columns: 14% 29% 29% 28%; 
            padding: 0 25px 8px 25px; 
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: #000;
        }

        .flight-card {
            border: 1px solid var(--border-color); border-radius: 12px;
            margin-bottom: 15px; overflow: hidden; position: relative;
        }

        .flight-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 10px; background: var(--primary-blue);
        }

        .card-top {
            display: grid; 
            grid-template-columns: 14% 29% 29% 28%; 
            padding: 15px 25px; 
            background: white;
            align-items: start;
        }

        .card-bottom {
            background: var(--light-blue); 
            padding: 10px 25px; 
            border-top: 1.2px dotted #a0b0c0;
            display: grid; 
            grid-template-columns: 43% 29% 28%;
            align-items: start;
        }

        .f-num { font-weight: 800; font-size: 17px; color: var(--primary-blue); margin-bottom: 2px; }
        .f-model { font-size: 10px; color: var(--text-grey); font-weight: 600; }
        
        .time { font-size: 24px; font-weight: 800; color: #000; line-height: 1; margin-bottom: 2px; }
        .date { font-size: 14px; font-weight: 800; color: #000; }
        .airport { 
            font-size: 11px; color: var(--text-grey); font-weight: 600; 
            margin-top: 6px; display: block; line-height: 1.2; max-width: 190px; 
        }

        .bag-item { margin-bottom: 3px; }
        .bag-title { font-weight: 800; font-size: 9.5px; color: #000; display: block; }
        .bag-desc { font-size: 9px; color: var(--text-grey); font-weight: 600; display: block; }

        .label-sm { font-size: 8.5px; color: #576574; text-transform: uppercase; font-weight: 800; margin-bottom: 3px; display: block; }
        
        .val-lg { 
            font-size: 12.5px; 
            font-weight: 800; 
            color: var(--primary-blue); 
            text-transform: uppercase; 
            line-height: 1.1; 
            white-space: pre-line; 
        }

        .footer-legal {
            margin-top: auto; padding-top: 12px; border-top: 1px solid #eee;
            font-size: 9.5px; color: #7f8c8d; line-height: 1.3; text-align: justify;
        }

        [contenteditable="true"]:focus { outline: none; background: #fffde7; border-radius: 3px; }

        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-mode active" onclick="changeMode(1, this)">Borish</button>
        <button class="btn-mode" onclick="changeMode(2, this)">Borish Qaytish</button>
        <button class="btn-mode" id="multi-btn" onclick="toggleMulti(this)">Ko'p shahar ▾</button>
        
        <div id="multi-choices" class="multi-options">
            <button onclick="changeMode(3, this)">3 ta</button>
            <button onclick="changeMode(4, this)">4 ta</button>
            <button onclick="changeMode(5, this)">5 ta</button>
            <button onclick="changeMode(6, this)">6 ta</button>
        </div>

        <button class="btn-pdf" onclick="saveAsPDF()">Yuklab Olish</button>
    </div>

    <div id="ticket-container"></div>

    <script>
        const agencyName = "TRAVEL LIKE PRO LLC";
        const agencyDetails = "Toshkent, Yakkasaray Sh. Rustaveli 60<br>+998 50 500 5001";
        const legalText = "Ko‘rsatilgan samolyot turi chipta bron qilingan paytdagi ma’lumotga asoslangan. Aviakompaniya samolyotni almashtirishi mumkin. Yo‘lovchi va bagajni havo orqali tashish shartnomasi Varshava yoki Monreal konvensiyasi qoidalari asosida amalga oshiriladi.";

        // Ismlar sonini tekshirish funksiyasi
        function validatePassengerNames(element) {
            const text = element.innerText;
            const lines = text.split('\n').filter(line => line.trim() !== "");
            
            if (lines.length > 6) {
                alert("Diqqat! Bitta boxga ko'pi bilan 6 ta yo'lovchi kiritish mumkin.");
                // Faqat birinchi 6 ta qatorni qoldirish
                const validLines = lines.slice(0, 6);
                element.innerText = validLines.join('\n');
                
                // Kursorni oxiriga qaytarish
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(element);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        function createFlightCard(index) {
            return `
            <div class="flight-card">
                <div class="card-top">
                    <div>
                        <div class="f-num" contenteditable="true">VE-912${index}</div>
                        <div class="f-model" contenteditable="true"></div>
                    </div>
                    <div>
                        <div class="time" contenteditable="true">11:30</div>
                        <div class="date" contenteditable="true">12.07.2026</div>
                        <span class="airport" contenteditable="true">Departure Airport Name</span>
                    </div>
                    <div>
                        <div class="time" contenteditable="true">12:35</div>
                        <div class="date" contenteditable="true">12.07.2026</div>
                        <span class="airport" contenteditable="true">Arrival Airport Name</span>
                    </div>
                    <div>
                        <div class="bag-item">
                            <span class="bag-title" contenteditable="true">Yuk bagaj — 1 ta, 0kg gacha</span>
                            <span class="bag-desc" contenteditable="true">Max 158CM | 0 kg.</span>
                        </div>
                        <div class="bag-item">
                            <span class="bag-title" contenteditable="true">Qo'l yuki: 1 dona, 8 kg gacha</span>
                            <span class="bag-desc" contenteditable="true">Max 55*40*20CM | 8 kg.</span>
                        </div>
                    </div>
                </div>
                <div class="card-bottom">
                    <div>
                        <span class="label-sm">Yo'lovchi / Passenger</span>
                        <div class="val-lg" contenteditable="true" oninput="validatePassengerNames(this)">1. FAMILIA ISM</div>
                    </div>
                    <div>
                        <span class="label-sm">Buyurtma / Reference</span>
                        <div class="val-lg" contenteditable="true">MVL64Q</div>
                    </div>
                    <div>
                        <span class="label-sm">Bilet raqami / Ticket number</span>
                        <div class="val-lg" contenteditable="true">784-2133031245</div>
                    </div>
                </div>
            </div>`;
        }

        function changeMode(totalCount, btn) {
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            if(totalCount > 2) document.getElementById('multi-btn').classList.add('active');
            else if(btn) btn.classList.add('active');

            const container = document.getElementById('ticket-container');
            container.innerHTML = '';

            for (let i = 0; i < totalCount; i++) {
                if (i % 3 === 0) {
                    const pageNum = Math.floor(i / 3) + 1;
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page' + (pageNum > 1 ? ' page-break' : '');
                    pageDiv.innerHTML = `
                        <div class="top-line">ELECTRONIC TICKET ITINERARY ${pageNum > 1 ? '(CONTINUED)' : ''}</div>
                        <div class="header-main">
                            <div class="logo-box"><img src="./travel.png"></div>
                            <div class="agency-info">
                                <div class="agency-name" contenteditable="true">${agencyName}</div>
                                <div class="agency-details" contenteditable="true">${agencyDetails}</div>
                            </div>
                        </div>
                        <div class="column-labels">
                            <div>Reys/Flight</div><div>Uchish/Departure</div><div>Qo'nish/Arrival</div><div>Bagaj/Baggage</div>
                        </div>
                        <div class="flights-list"></div>
                        <div class="footer-legal">${legalText}</div>
                    `;
                    container.appendChild(pageDiv);
                }
                const currentFlightsList = container.lastElementChild.querySelector('.flights-list');
                currentFlightsList.innerHTML += createFlightCard(i + 1);
            }
            if(totalCount <= 2) document.getElementById('multi-choices').style.display = 'none';
        }

        function toggleMulti(btn) {
            const options = document.getElementById('multi-choices');
            options.style.display = (options.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveAsPDF() {
            const element = document.getElementById('ticket-container');
            const opt = {
                margin: 0,
                filename: 'Travel_Like_Pro_Ticket.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 4, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            };
            html2pdf().set(opt).from(element).save();
        }

        window.onload = () => changeMode(1);
    </script>
</body>
</html>
