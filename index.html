<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Like Pro - Travel Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1a2b56;
            --accent: #f24484;
            --bg-page: #525659;
            --text-grey: #7f8c8d;
            --card-footer-bg: #e7edf3; /* Rasmdagi to'qroq fon */
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-page); 
            margin: 0; 
            padding: 20px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .nav-buttons { 
            margin-bottom: 25px; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 850px; 
            display: flex; 
            flex-direction: column;
            gap: 10px; 
            position: sticky;
            top: 10px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .main-nav { display: flex; gap: 10px; width: 100%; }
        .multi-choice { display: none; gap: 8px; margin-top: 10px; background: #f0f2f5; padding: 10px; border-radius: 8px; }

        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; flex: 1; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-grey { background: #4a4e51; color: white; }
        .btn-red { background: var(--accent); color: white; }
        .btn-num { background: white; color: var(--primary); border: 2px solid var(--primary); min-width: 45px; flex: none; }

        #ticket-container { width: 850px; background: white; margin: 0 auto; }

        .page {
            padding: 40px 50px;
            min-height: 1120px; 
            display: flex;
            flex-direction: column;
            background: white;
        }

        .page-break { page-break-before: always; }

        .itinerary-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7f8c8d;
            font-weight: 800;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 50px;
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 60px;
        }

        .logo-box { width: 220px; }
        .logo-box img { width: 100%; }
        
        .address-box { text-align: right; line-height: 1.6; }
        .agency-name { font-weight: 900; color: var(--primary); font-size: 18px; margin-bottom: 5px; }
        .agency-info { font-size: 14px; color: #576574; }

        /* Sarlavhalar satri */
        .labels-row {
            display: grid;
            grid-template-columns: 18% 27% 27% 28%;
            padding: 0 25px 15px 25px;
            font-size: 13px;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* REYS KARTASI - Rasmga moslangan */
        .flight-card {
            background: #fff;
            border: 1px solid #d1d8e0;
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* Chap tomondagi to'liq ko'k chiziq */
        .flight-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 10px;
            background: var(--primary);
        }

        .card-body {
            display: grid;
            grid-template-columns: 18% 27% 27% 28%;
            padding: 25px 30px;
        }

        /* Nuqtali separator chizig'i */
        .card-footer {
            background: var(--card-footer-bg); 
            padding: 20px 30px;
            border-top: 1.5px dotted #b2bec3;
            display: grid;
            grid-template-columns: 45% 27% 28%;
        }

        .f-code { font-weight: 800; font-size: 20px; color: var(--primary); margin-bottom: 2px; }
        .plane-type { font-size: 11px; color: #95a5a6; font-weight: 500; }

        .time { font-size: 32px; font-weight: 800; color: #000; display: block; line-height: 1; }
        .date { font-size: 16px; font-weight: 800; color: #000; display: block; margin-top: 5px; }
        .loc { font-size: 13px; color: #7f8c8d; font-weight: 600; display: block; margin-top: 10px; }

        .baggage-title { font-weight: 800; font-size: 11px; display: block; color: #000; margin-bottom: 2px; }
        .baggage-desc { color: #7f8c8d; font-size: 10px; display: block; margin-bottom: 5px; font-weight: 500; }

        /* Footer matnlari */
        .psg-label { font-size: 10px; color: #576574; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; display: block; }
        .psg-value { font-size: 18px; font-weight: 800; color: var(--primary); display: block; }

        .legal {
            margin-top: auto;
            font-size: 11px;
            color: #7f8c8d;
            text-align: justify;
            border-top: 1px solid #eee;
            padding-top: 25px;
            line-height: 1.6;
        }

        [contenteditable="true"]:focus { background: rgba(255,255,255,0.5); outline: none; border-radius: 4px; }

        @media print { .nav-buttons { display: none; } }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <div class="main-nav">
            <button class="btn-blue" onclick="setMode(1)">Bir tomonlama</button>
            <button class="btn-blue" onclick="setMode(2)">Borish-Qaytish</button>
            <button class="btn-grey" onclick="toggleMulti()">Bir nechta shahar (3-6) ▾</button>
            <button class="btn-red" onclick="downloadPDF()">PDF Saqlash</button>
        </div>
        <div id="multi-choice" class="multi-choice">
            <button class="btn-num" onclick="setMode(3)">3</button>
            <button class="btn-num" onclick="setMode(4)">4</button>
            <button class="btn-num" onclick="setMode(5)">5</button>
            <button class="btn-num" onclick="setMode(6)">6</button>
        </div>
    </div>

    <div id="ticket-container">
        <!-- SAHIFA 1 -->
        <div class="page" id="page1">
            <div class="itinerary-header">Electronic Ticket Itinerary</div>
            
            <div class="header-main">
                <div class="logo-box"><img src="./travel.png" alt="Logo"></div>
                <div class="address-box">
                    <div class="agency-name" contenteditable="true">TRAVEL LIKE PRO LLC</div>
                    <div class="agency-info" contenteditable="true">Toshkent, Yakkasaray Sh. Rustaveli 60</div>
                    <div class="agency-info" contenteditable="true">+998 50 500 5001</div>
                </div>
            </div>

            <div class="labels-row">
                <div>Reys/Flight</div>
                <div>Uchish/Departure</div>
                <div>Qo'nish/Arrival</div>
                <div>Bagaj/Baggage</div>
            </div>

            <div id="flights-container-p1"></div>
            <div id="legal-p1" class="legal"></div>
        </div>

        <!-- SAHIFA 2 -->
        <div class="page page-break" id="id-page2" style="display:none">
            <div class="itinerary-header">Electronic Ticket Itinerary </div>
            <div class="labels-row">
                <div>Reys/Flight</div>
                <div>Uchish/Departure</div>
                <div>Qo'nish/Arrival</div>
                <div>Bagaj/Baggage</div>
            </div>
            <div id="flights-container-p2"></div>
            <div id="legal-p2" class="legal"></div>
        </div>
    </div>

    <script>
        const legalContent = `Ko‘rsatilgan uchish vaqti va samolyot turi, chipta bron qilingan paytdagi ma’lumotga asoslangan. Aviakompaniya uchish vaqtini va samolyotni turini almashtirish huquqiga ega! Ro'yhatga olish parvoz vaqtidan 3 soat oldin boshlanadi va parvoz vaqtiga 1 soat qolganda to'xtatiladi. Yo‘lovchi tashish bilan bog‘liq ravishda boriladigan davlatlarning barcha davlat organlari talablariga rioya qilishi, shuningdek kirish, chiqish va boshqa zarur hujjatlarga ega bo‘lishi shart.

Agar yo‘lovchiga boriladigan mamlakatga kirish rad etilsa, tashuvchiga yetkazilgan barcha xarajatlar uchun yo‘lovchi javobgar bo‘ladi va tashuvchi ushbu rad etish natijasida yuzaga kelgan barcha xarajatlarni yo‘lovchidan undirish huquqiga ega<br><br>The indicated departure time and aircraft type are based on the information available at the time of ticket booking. The airline reserves the right to change the departure time and aircraft type. Check-in opens 3 hours before departure and closes 1 hour before the flight. The passenger should follow all the requirements of the state authorities of the countries of destination related to
transportation, as well as, have entry, exit and other proper documents.
In the case of denial of entry into the country of destination, the passenger is responsible for any costs incurred to the
carrier and the carrier is entitled to recover from the passenger all costs incurred as a result of such denial.`;

        function toggleMulti() {
            const div = document.getElementById('multi-choice');
            div.style.display = (div.style.display === 'flex') ? 'none' : 'flex';
        }

        function createFlightCard(index) {
            return `
                <div class="flight-card">
                    <div class="card-body">
                        <div>
                            <div class="f-code" contenteditable="true">VE-912${index}</div>
                            <span class="plane-type" contenteditable="true"></span>
                        </div>
                        <div>
                            <div class="time" contenteditable="true">11:30</div>
                            <div class="date" contenteditable="true">12.07.2026</div>
                            <div class="loc" contenteditable="true">Departure Airport Name</div>
                        </div>
                        <div>
                            <div class="time" contenteditable="true">12:35</div>
                            <div class="date" contenteditable="true">12.07.2026</div>
                            <div class="loc" contenteditable="true">Arrival Airport Name</div>
                        </div>
                        <div class="baggage-cell">
                            <div contenteditable="true">
                                <span class="baggage-title">Yuk bagaj — 1 ta, 0kg gacha</span>
                                <span class="baggage-desc">Max 158CM | 0 kg.</span>
                                <span class="baggage-title">Qo‘l yuki: 1 dona, 8 kg gacha</span>
                                <span class="baggage-desc">Max 55*40*20CM | 8 kg.</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div>
                            <span class="psg-label">Yo'lovchi / Passenger</span>
                            <span class="psg-value" contenteditable="true">FAMILIA / ISM</span>
                        </div>
                        <div>
                            <span class="psg-label">Buyurtma / Reference</span>
                            <span class="psg-value" contenteditable="true">MVL64Q</span>
                        </div>
                        <div>
                            <span class="psg-label">Bilet raqami / Ticket number</span>
                            <span class="psg-value" contenteditable="true">784-2133031245</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function setMode(count) {
            const c1 = document.getElementById('flights-container-p1');
            const c2 = document.getElementById('flights-container-p2');
            const p2 = document.getElementById('id-page2');
            const l1 = document.getElementById('legal-p1');
            const l2 = document.getElementById('legal-p2');

            c1.innerHTML = ''; c2.innerHTML = '';
            
            for (let i = 1; i <= Math.min(count, 3); i++) {
                c1.innerHTML += createFlightCard(i);
            }

            if (count > 3) {
                p2.style.display = 'flex';
                for (let i = 4; i <= count; i++) {
                    c2.innerHTML += createFlightCard(i);
                }
                l1.innerHTML = ''; l2.innerHTML = legalContent;
            } else {
                p2.style.display = 'none';
                l1.innerHTML = legalContent; l2.innerHTML = '';
            }
            document.getElementById('multi-choice').style.display = 'none';
        }

        function downloadPDF() {
            const element = document.getElementById('ticket-container');
            const opt = {
                margin: 0,
                filename: 'Flight_Ticket_TravelLikePro.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, width: 850 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        window.onload = () => setMode(1);
    </script>
</body>
</html>
